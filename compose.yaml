services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8088}:80"
    environment:
      DB_HOST: banco
      DB_PORT: 5432
      DB_NAME: chamados
      DB_USER: chamados_user
      DB_PASSWORD: chamados_pass
    volumes:
      - .:/var/www/html
    depends_on:
      banco:
        condition: service_healthy

  banco:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chamados
      POSTGRES_USER: chamados_user
      POSTGRES_PASSWORD: chamados_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chamados_user -d chamados"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
